<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Transcriber</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#4ade80"/>
          </svg>
        </div>
        <h1>Meet Transcriber</h1>
      </div>
      <div class="header-right">
        <span id="entry-count" class="badge">0 lines</span>
      </div>
    </header>

    <div id="status-bar" class="status-bar status-waiting">
      <span class="status-dot"></span>
      <span id="status-text">Waiting for captions…</span>
    </div>

    <div id="transcript-area" class="transcript-area">
      <div id="empty-state" class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" opacity="0.3">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" fill="currentColor"/>
        </svg>
        <p>No captions captured yet.</p>
        <p class="hint">Make sure captions are turned on in Google Meet.</p>
      </div>
      <div id="transcript-content" class="transcript-content"></div>
    </div>

    <!-- Summary Panel (slides over transcript) -->
    <div id="summary-panel" class="summary-panel hidden">
      <div class="summary-header">
        <h2>✨ Meeting Summary</h2>
        <button id="btn-close-summary" class="btn-icon" title="Close summary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div id="summary-content" class="summary-content">
        <div id="summary-loading" class="summary-loading hidden">
          <div class="spinner"></div>
          <p>Analyzing transcript with Gemini…</p>
        </div>
        <div id="summary-result" class="summary-result"></div>
        <div id="summary-error" class="summary-error hidden"></div>
      </div>
    </div>

    <footer class="popup-footer">
      <button id="btn-summarize" class="btn btn-accent" title="Summarize with AI">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61z" fill="currentColor"/>
        </svg>
        Summarize
      </button>
      <button id="btn-detect-tasks" class="btn btn-accent" title="Extract Tasks" style="background-color: #f59e0b; color: white;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/>
        </svg>
        Detect Tasks
      </button>
      <button id="btn-download" class="btn btn-primary" title="Download as PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/>
        </svg>
        Download PDF
      </button>
      <button id="btn-clear" class="btn btn-danger" title="Clear transcript">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/>
        </svg>
        Clear
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
